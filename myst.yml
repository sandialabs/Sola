version: 1
project:
  id: 115e2e1f-8e9d-416c-b56b-c9f81f82a2c5
  title: "Sandbox for Outer Loop Analysis (Sola)"
  description: "This MATLAB library solves equality constrained optimization problems in reduced space with derivative (1st and 2nd) based optimization computed via adjoints. In addition, it automatically enables hyper-differential sensitivity analysis with respect to model discrepancy."
